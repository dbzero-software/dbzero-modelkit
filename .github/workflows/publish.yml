name: Release and publish

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dbzero-modelkit/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate workflow ref
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Run this workflow from a branch, not a tag."
            exit 1
          fi

      - name: Bump package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          bump = "${{ inputs.version_bump }}"
          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version = "(\d+)\.(\d+)\.(\d+)"$', text)
          if not match:
              raise SystemExit("pyproject.toml must contain a simple X.Y.Z project version")

          major, minor, patch = map(int, match.groups())
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump type: {bump}")

          old_version = match.group(1)
          new_version = f"{major}.{minor}.{patch}"
          text = text[:match.start(1)] + new_version + text[match.end(1):]
          path.write_text(text, encoding="utf-8")
          print(f"old_version={old_version}")
          print(f"new_version={new_version}")
          print(f"tag=v{new_version}")
          PY

      - name: Install package with development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        run: ./run_lint.sh

      - name: Run tests
        run: ./run_tests.sh

      - name: Build package
        run: python -m build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
